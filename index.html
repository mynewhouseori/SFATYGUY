<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>כניסה לאפליקציית בטיחות</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-screen">
      <header class="login-header">
        <a class="brand-mark" href="#" aria-label="דף הבית של האפליקציה">
          <img src="logo01.jpeg" alt="לוגו OL Safety" />
        </a>
      </header>

      <section class="login-hero">
        <div class="login-overlay"></div>
        <div class="login-card">
          <p class="login-eyebrow">SAFETY FIELD APP</p>
          <h1>אפליקציית בטיחות למנהל העבודה</h1>
          <p>
            כניסה מהירה לדיווחי שטח, ליקויים ודוחות ישירות מהנייד.
          </p>
          <button class="enter-button" id="enterButton" type="button">כניסה</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
